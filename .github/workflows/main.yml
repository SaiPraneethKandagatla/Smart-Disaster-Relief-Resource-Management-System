name: Flask App CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run basic Flask check
      - name: Run basic app check
        run: |
          echo "Flask project structure:"
          ls -la

      # 5. Optional: Run app test (safe mode)
      - name: Start Flask app (test)
        run: |
          export FLASK_APP=app.py || true
          echo "Flask setup successful"
