name: CI-CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run lint checks
        run: |
          ruff check . --select E9,F63,F7,F82

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flask werkzeug pymongo

      - name: Compile Python files
        run: python -m compileall -q .

      - name: Smoke import core modules
        run: |
          python - <<'PY'
          import admin_app  # noqa: F401
          import web_app  # noqa: F401
          import relief_system  # noqa: F401
          import request_queue  # noqa: F401
          import db  # noqa: F401
          print('Core modules imported successfully')
          PY

  test:
    name: Testing
    runs-on: ubuntu-latest
    needs: [lint, build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flask werkzeug pymongo

      - name: Run tests (or smoke tests)
        run: |
          if ls test*.py *_test.py tests/test*.py >/dev/null 2>&1; then
            pytest -q
          else
            python - <<'PY'
            from web_app import app as web_app
            from admin_app import app as admin_app

            assert web_app is not None
            assert admin_app is not None
            print('No pytest tests found. Smoke test passed.')
            PY
          fi

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -q -r . -x .venv,venv,__pycache__,.git

      - name: Run pip-audit
        run: pip-audit

  deploy:
    name: Deployment
    runs-on: ubuntu-latest
    needs: [lint, build, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger deployment hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured. Skipping deployment trigger."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
          echo "Deployment trigger sent successfully."